<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="robots"
        content="noindex, nofollow, noarchive"
    >

    <title>Create New Password | Echo Craft Studio</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="css/partner-dashboard.css"
    >

</head>

<body class="partnerLoginPage">

    <main class="partnerLoginExperience">

        <a
            class="partnerReturnLink"
            href="login.html"
        >
            <i class="fa-solid fa-arrow-left"></i>
            Return to Partner Login
        </a>

        <section class="partnerLoginShell">

            <aside class="partnerLoginBrandPanel">

                <a
                    class="partnerLoginBrand"
                    href="../index.html"
                    aria-label="Echo Craft Studio home"
                >

                    <img
                        src="../images/branding/logos/ec-gold-logo.png"
                        alt="Echo Craft Studio"
                    >

                    <div>
                        <strong>Echo Craft</strong>
                        <span>Participation Program</span>
                    </div>

                </a>

                <p class="partnerLoginEyebrow">
                    Secure Account Recovery
                </p>

                <h1>
                    Create Your
                    <span>New Password.</span>
                </h1>

                <p class="partnerLoginLead">
                    Choose a new password for your approved Echo Craft
                    partner account.
                </p>

            </aside>

            <section class="partnerLoginFormPanel">

                <div class="partnerLoginFormHeader">

                    <span class="partnerLoginFormIcon">
                        <i class="fa-solid fa-key"></i>
                    </span>

                    <p class="partnerLoginFormLabel">
                        Password Recovery
                    </p>

                    <h2>
                        Set New Password
                    </h2>

                    <p>
                        Enter and confirm your new password below.
                    </p>

                </div>

                <div
                    id="partnerResetAlert"
                    class="partnerLoginAlert"
                    role="alert"
                    aria-live="polite"
                    hidden
                >

                    <i class="fa-solid fa-circle-exclamation"></i>

                    <span id="partnerResetAlertMessage"></span>

                </div>

                <form
                    id="partnerResetPasswordForm"
                    class="partnerLoginForm"
                    novalidate
                >

                    <div class="partnerLoginField">

                        <label for="partnerNewPassword">
                            New Password
                        </label>

                        <div class="partnerInputShell">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                id="partnerNewPassword"
                                type="password"
                                autocomplete="new-password"
                                minlength="8"
                                placeholder="At least 8 characters"
                                required
                            >

                        </div>

                        <span
                            id="partnerNewPasswordError"
                            class="partnerFieldError"
                            aria-live="polite"
                        ></span>

                    </div>

                    <div class="partnerLoginField">

                        <label for="partnerConfirmPassword">
                            Confirm New Password
                        </label>

                        <div class="partnerInputShell">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                id="partnerConfirmPassword"
                                type="password"
                                autocomplete="new-password"
                                minlength="8"
                                placeholder="Enter the password again"
                                required
                            >

                        </div>

                        <span
                            id="partnerConfirmPasswordError"
                            class="partnerFieldError"
                            aria-live="polite"
                        ></span>

                    </div>

                    <button
                        id="partnerResetPasswordButton"
                        class="partnerLoginButton"
                        type="submit"
                    >

                        <span class="partnerLoginDefault">

                            Save New Password

                            <i class="fa-solid fa-arrow-right"></i>

                        </span>

                        <span
                            class="partnerLoginLoading"
                            aria-hidden="true"
                        >

                            <i class="fa-solid fa-spinner fa-spin"></i>

                            Saving Password

                        </span>

                    </button>

                </form>

            </section>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../admin/js/supabase-config.js"></script>

    <script src="../js/partner-reset-password.js"></script>

</body>

</html>
